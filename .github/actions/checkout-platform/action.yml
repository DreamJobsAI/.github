name: Checkout platform layout
description: Checkout service + ai-common into platform/ sibling directories.

inputs:
  service_name:
    description: Service directory name under platform/ (e.g. ai_gateway, agent_b2b)
    required: true
  dependency_repository:
    description: Dependency repo (empty to skip)
    required: false
    default: DreamJobsAI/ai-common
  dependency_name:
    description: Dependency directory name under platform/
    required: false
    default: ai_common
  dependency_ref:
    description: Git ref for dependency
    required: false
    default: dev
  app_id:
    description: GitHub App ID (org secret GH_APP_ID) for cross-repo checkout
    required: false
    default: ""
  app_private_key:
    description: GitHub App private key PEM (org secret GH_APP_PRIVATE_KEY)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Create platform directory
      shell: bash
      run: mkdir -p platform

    - name: Checkout service
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true
        path: platform/${{ inputs.service_name }}

    - name: Create GitHub App token
      id: app-token
      if: inputs.dependency_repository != '' && inputs.app_id != ''
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.app_id }}
        private-key: ${{ inputs.app_private_key }}
        owner: DreamJobsAI
        repositories: ai-common

    - name: Validate dependency checkout credentials
      if: inputs.dependency_repository != ''
      shell: bash
      env:
        APP_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        if [ -z "$APP_TOKEN" ]; then
          echo "::error::GitHub App token is required for dependency checkout."
          echo "::error::Set org secrets GH_APP_ID and GH_APP_PRIVATE_KEY; pass them to checkout-platform."
          exit 1
        fi

    - name: Checkout dependency
      if: inputs.dependency_repository != ''
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.dependency_repository }}
        ref: ${{ inputs.dependency_ref }}
        path: platform/${{ inputs.dependency_name }}
        token: ${{ steps.app-token.outputs.token }}
        persist-credentials: false
