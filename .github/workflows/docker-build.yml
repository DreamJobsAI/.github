# ==============================================================================
# Reusable Docker Build & Push to ECR
# ==============================================================================
# Services that depend on ai-common install it from GitHub Packages (runtime-ci
# Docker target). No cross-repo checkout required.
# ==============================================================================

name: Docker Build & Push to ECR

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      aws_account_id:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: "eu-central-1"
      ecr_repository:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      docker_target:
        required: false
        type: string
        default: "runtime-ci"
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  id-token: write
  contents: read
  packages: read
  actions: read

jobs:
  build-and-push:
    name: "Build ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: docker-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          case "${BRANCH}" in
            dev)     SUFFIX="-dev" ;;
            staging) SUFFIX="-staging" ;;
            main)    SUFFIX="" ;;
            *) echo "::error::Unsupported branch: ${BRANCH}"; exit 1 ;;
          esac
          git fetch --tags --force
          if [ -z "${SUFFIX}" ]; then
            LATEST=$(git tag --list 'v[0-9]*' | grep -E '^v[0-9]+$' | sed 's/^v//' | sort -n | tail -1)
          else
            LATEST=$(git tag --list "v[0-9]*${SUFFIX}" | sed "s/^v//; s/${SUFFIX}$//" | sort -n | tail -1)
          fi
          NEXT_VERSION=$(( ${LATEST:-0} + 1 ))
          VERSION_TAG="v${NEXT_VERSION}${SUFFIX}"
          ROLLING_TAG=$([ -z "${SUFFIX}" ] && echo "latest" || echo "latest${SUFFIX}")
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "rolling_tag=${ROLLING_TAG}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: gha-ecr-${{ inputs.service_name }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile }}
          target: ${{ inputs.docker_target }}
          secrets: |
            gh_token=${{ secrets.GITHUB_TOKEN }}
          push: true
          tags: |
            ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${{ inputs.ecr_repository }}:${{ steps.version.outputs.version_tag }}
            ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${{ inputs.ecr_repository }}:${{ steps.version.outputs.rolling_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version_tag }}"
          git push origin "${{ steps.version.outputs.version_tag }}"
