# ==============================================================================
# Reusable Docker Build & Push to ECR
# ==============================================================================
# Platform layout:
#   platform/
#     ai_gateway/ | agent_b2b/ | mcps/
#     ai_common/              (when dependency_repository is set)
# ==============================================================================

name: Docker Build & Push to ECR

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      aws_account_id:
        required: true
        type: string
      aws_region:
        required: false
        type: string
        default: "eu-central-1"
      ecr_repository:
        required: true
        type: string
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      service_directory:
        description: Directory under platform/ (e.g. ai_gateway). Empty = standalone at repo root.
        required: false
        type: string
        default: ""
      dependency_repository:
        required: false
        type: string
        default: ""
      dependency_ref:
        required: false
        type: string
        default: "dev"
    secrets:
      AWS_ROLE_ARN:
        required: true
      GH_APP_ID:
        required: false
        description: Org secret GH_APP_ID; required when dependency_repository is set
      GH_APP_PRIVATE_KEY:
        required: false
        description: Org secret GH_APP_PRIVATE_KEY; required when dependency_repository is set

permissions:
  id-token: write
  contents: write
  actions: read

jobs:
  build-and-push:
    name: "Build ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: docker-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout standalone service
        if: inputs.service_directory == ''
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Create GitHub App token
        if: inputs.service_directory != '' && inputs.dependency_repository != ''
        id: app-token
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1.12.0
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: DreamJobsAI
          repositories: ai-common

      - name: Checkout platform layout
        if: inputs.service_directory != ''
        uses: DreamJobsAI/.github/.github/actions/checkout-platform@main
        with:
          service_name: ${{ inputs.service_directory }}
          dependency_repository: ${{ inputs.dependency_repository }}
          dependency_ref: ${{ inputs.dependency_ref }}
          checkout_token: ${{ steps.app-token.outputs.token }}

      - name: Resolve paths
        id: paths
        run: |
          if [ -n "${{ inputs.service_directory }}" ]; then
            echo "service_dir=platform/${{ inputs.service_directory }}" >> "$GITHUB_OUTPUT"
            echo "build_context=platform/${{ inputs.service_directory }}" >> "$GITHUB_OUTPUT"
            echo "has_dependency=true" >> "$GITHUB_OUTPUT"
          else
            echo "service_dir=." >> "$GITHUB_OUTPUT"
            echo "build_context=." >> "$GITHUB_OUTPUT"
            echo "has_dependency=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version
        id: version
        working-directory: ${{ steps.paths.outputs.service_dir }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          case "${BRANCH}" in
            dev)     SUFFIX="-dev" ;;
            staging) SUFFIX="-staging" ;;
            main)    SUFFIX="" ;;
            *) echo "::error::Unsupported branch: ${BRANCH}"; exit 1 ;;
          esac
          git fetch --tags --force
          if [ -z "${SUFFIX}" ]; then
            LATEST=$(git tag --list 'v[0-9]*' | grep -E '^v[0-9]+$' | sed 's/^v//' | sort -n | tail -1)
          else
            LATEST=$(git tag --list "v[0-9]*${SUFFIX}" | sed "s/^v//; s/${SUFFIX}$//" | sort -n | tail -1)
          fi
          NEXT_VERSION=$(( ${LATEST:-0} + 1 ))
          VERSION_TAG="v${NEXT_VERSION}${SUFFIX}"
          ROLLING_TAG=$([ -z "${SUFFIX}" ] && echo "latest" || echo "latest${SUFFIX}")
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "rolling_tag=${ROLLING_TAG}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: gha-ecr-${{ inputs.service_name }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push (with ai-common)
        if: steps.paths.outputs.has_dependency == 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ steps.paths.outputs.build_context }}
          file: ${{ steps.paths.outputs.service_dir }}/${{ inputs.dockerfile }}
          build-contexts: ai_common=platform/ai_common
          push: true
          tags: |
            ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${{ inputs.ecr_repository }}:${{ steps.version.outputs.version_tag }}
            ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${{ inputs.ecr_repository }}:${{ steps.version.outputs.rolling_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Build and push (standalone)
        if: steps.paths.outputs.has_dependency == 'false'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ steps.paths.outputs.build_context }}
          file: ${{ steps.paths.outputs.service_dir }}/${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${{ inputs.ecr_repository }}:${{ steps.version.outputs.version_tag }}
            ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${{ inputs.ecr_repository }}:${{ steps.version.outputs.rolling_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Create git tag
        working-directory: ${{ steps.paths.outputs.service_dir }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag "${{ steps.version.outputs.version_tag }}"
          git push origin "${{ steps.version.outputs.version_tag }}"
