# ==============================================================================
# Reusable Docker Build & Push to ECR
# ==============================================================================
#
# Platform layout contract (when ai-common is required):
#   $WORKSPACE/
#     ai_common/      ← dependency
#     {service}/      ← service repo (e.g. ai_gateway, agent_b2b)
#
# Service Dockerfile uses: COPY --from=ai_common
# Docker build uses named context: ai_common=./ai_common
#
# Standalone services (mcps): leave service_checkout_path empty, no dependency.
# ==============================================================================

name: Docker Build & Push to ECR

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name (for logging and step summary)"
        required: true
        type: string
      aws_account_id:
        description: "AWS account ID"
        required: true
        type: string
      aws_region:
        description: "AWS region for ECR"
        required: false
        type: string
        default: "eu-central-1"
      ecr_repository:
        description: "ECR repository name (e.g., dreamjobs-ai/ai-gateway)"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile relative to service directory"
        required: false
        type: string
        default: "Dockerfile"
      service_checkout_path:
        description: "Service checkout subdirectory (empty = repo root, for standalone services)"
        required: false
        type: string
        default: ""
      dependency_repository:
        description: "Dependency repo (empty = none)"
        required: false
        type: string
        default: ""
      dependency_path:
        description: "Dependency checkout path"
        required: false
        type: string
        default: "ai_common"
      dependency_ref:
        description: "Git ref for dependency"
        required: false
        type: string
        default: "dev"
    secrets:
      AWS_ROLE_ARN:
        description: "IAM role ARN for OIDC-based ECR push"
        required: true

permissions:
  id-token: write
  contents: write

jobs:
  build-and-push:
    name: "Build ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    concurrency:
      group: docker-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout standalone service
        if: inputs.service_checkout_path == ''
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout platform layout
        if: inputs.service_checkout_path != ''
        uses: DreamJobsAI/.github/.github/actions/checkout-platform@main
        with:
          service_path: ${{ inputs.service_checkout_path }}
          dependency_repository: ${{ inputs.dependency_repository }}
          dependency_path: ${{ inputs.dependency_path }}
          dependency_ref: ${{ inputs.dependency_ref }}

      - name: Resolve paths
        id: paths
        run: |
          if [ -n "${{ inputs.service_checkout_path }}" ]; then
            echo "service_dir=${{ inputs.service_checkout_path }}" >> "$GITHUB_OUTPUT"
            echo "build_context=${{ inputs.service_checkout_path }}" >> "$GITHUB_OUTPUT"
          else
            echo "service_dir=." >> "$GITHUB_OUTPUT"
            echo "build_context=." >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${{ inputs.dependency_repository }}" ]; then
            echo "build_contexts=ai_common=${{ inputs.dependency_path }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine version
        id: version
        working-directory: ${{ steps.paths.outputs.service_dir }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          case "${BRANCH}" in
            dev)     SUFFIX="-dev" ;;
            staging) SUFFIX="-staging" ;;
            main)    SUFFIX="" ;;
            *) echo "::error::Unsupported branch: ${BRANCH}"; exit 1 ;;
          esac
          git fetch --tags --force
          if [ -z "${SUFFIX}" ]; then
            LATEST=$(git tag --list 'v[0-9]*' | grep -E '^v[0-9]+$' | sed 's/^v//' | sort -n | tail -1)
          else
            LATEST=$(git tag --list "v[0-9]*${SUFFIX}" | sed "s/^v//; s/${SUFFIX}$//" | sort -n | tail -1)
          fi
          NEXT_VERSION=$(( ${LATEST:-0} + 1 ))
          VERSION_TAG="v${NEXT_VERSION}${SUFFIX}"
          ROLLING_TAG=$([ -z "${SUFFIX}" ] && echo "latest" || echo "latest${SUFFIX}")
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "rolling_tag=${ROLLING_TAG}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}
          role-session-name: gha-ecr-${{ inputs.service_name }}-${{ github.run_id }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.paths.outputs.build_context }}
          file: ${{ inputs.dockerfile }}
          build-contexts: ${{ steps.paths.outputs.build_contexts }}
          push: true
          tags: |
            ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${{ inputs.ecr_repository }}:${{ steps.version.outputs.version_tag }}
            ${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${{ inputs.ecr_repository }}:${{ steps.version.outputs.rolling_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Create git tag
        working-directory: ${{ steps.paths.outputs.service_dir }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.version_tag }}"
          git push origin "${{ steps.version.outputs.version_tag }}"

      - name: Build summary
        if: always()
        run: |
          ECR_URL="${{ inputs.aws_account_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${{ inputs.ecr_repository }}"
          echo "### Docker Build — ${{ inputs.service_name }}" >> "$GITHUB_STEP_SUMMARY"
          echo "| Tag | \`${{ steps.version.outputs.version_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rolling | \`${{ steps.version.outputs.rolling_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${ECR_URL}:${{ steps.version.outputs.version_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
